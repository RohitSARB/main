<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Playwright Master Page</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .card { border: 1px solid #ccc; margin: 10px; padding: 10px; }
    #infinite { height: 300px; overflow-y: scroll; border: 1px solid black; }
    button { margin: 5px; }
  </style>
</head>
<body>

<h1>Playwright Master Page</h1>

<!-- FORM -->
<h2>Login Form</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button id="submit-btn">Submit</button>
<p id="form-result"></p>

<!-- MENU -->
<h2 id="menu">Menu</h2>
<button id="new-tab">Open Details Tab</button>

<!-- CONTENT -->
<h2>Articles</h2>
<div id="articles">
  <div class="card" data-id="1">
    <h3>Playwright Basics</h3>
    <p>Learn browser automation from scratch.</p>
  </div>
  <div class="card" data-id="2">
    <h3>Advanced Playwright</h3>
    <p>Parallelism, contexts and stealth.</p>
  </div>
</div>

<!-- INFINITE SCROLL -->
<h2>Infinite Products</h2>
<div id="infinite"></div>

<!-- IFRAME -->
<h2>Iframe Section</h2>
<iframe srcdoc="
  <button id='frame-btn'>Frame Click</button>
  <p id='frame-text'>Iframe Content</p>
"></iframe>

<script>
  document.getElementById("submit-btn").onclick = () => {
    document.getElementById("form-result").innerText = "Form Submitted";
  };

  document.getElementById("new-tab").onclick = () => {
    window.open('details.html', '_blank');
  };

  const container = document.getElementById("infinite");
  let count = 0;

  function loadMore() {
    for (let i = 0; i < 5; i++) {
      const div = document.createElement("div");
      div.className = "card";
      div.innerText = "Product " + (++count);
      container.appendChild(div);
    }
  }

  loadMore();
  container.addEventListener("scroll", () => {
    if (container.scrollTop + container.clientHeight >= container.scrollHeight) {
      loadMore();
    }
  });
</script>

</body>
</html>
